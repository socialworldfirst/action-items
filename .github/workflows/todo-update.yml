name: Process Todo Updates
on:
  issues:
    types: [opened]

jobs:
  update:
    if: startsWith(github.event.issue.title, '/todo')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Process updates
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/process-todo.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "Update action items $(date +%Y-%m-%d)" && git push)

      - name: Close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue close ${{ github.event.issue.number }} --comment "Updates applied and deployed."
